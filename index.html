<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>調査アンケート</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background-color: #f4f7f6; color: #333; }
        .section { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; font-size: 16px; border-left: 5px solid #007bff; padding-left: 10px; margin-bottom: 15px; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        .checkbox-group { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .checkbox-item { display: flex; align-items: center; font-weight: normal; cursor: pointer; padding: 5px 0; width: 100%; }
        .checkbox-item input { width: auto; margin: 0 10px 0 0; transform: scale(1.2); }

        .road-map-container { margin: 15px 0; padding: 15px; background: #ffffff; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .road-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .road-item { display: flex; align-items: center; justify-content: center; background: #f8f9fa; border: 1px solid #ddd; padding: 8px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .road-item input { margin-right: 5px; width: 18px; height: 18px; }

        #map { height: 450px; width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #ccc; background: #f0f0f0; }
        #log { margin-top: 10px; font-size: 14px; color: #0056b3; background: #eef4ff; padding: 10px; border-radius: 6px; font-weight: bold; text-align: center; border: 1px solid #b3d7ff;}
        #sendBtn { width: 100%; padding: 20px; background-color: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; margin-bottom: 30px; transition: 0.3s; }
        
        #extraQuestionArea { display:none; margin-top:10px; padding:12px; background:#eef4ff; border: 1px solid #cce0ff; border-radius:8px; }
        
        .map-instruction { color: #333; font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .map-example { font-size: 13px; color: #666; margin-top: 8px; font-style: normal; font-weight: normal; }

        #thanks-page { display: none; text-align: center; padding: 50px 20px; }
        .check-mark { font-size: 80px; color: #28a745; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="survey-form">
        <h2 style="text-align:center; font-size: 20px;">調査アンケート</h2>

        <div class="section">
            <h3>1. あなたについて</h3>
            <label>年齢</label>
            <select id="age">
                <option value="">選択してください</option>
                <option value="9歳以下">9歳以下</option>
                <option value="10〜19歳">10〜19歳</option>
                <option value="20〜29歳">20〜29歳</option>
                <option value="30〜39歳">30〜39歳</option>
                <option value="40〜49歳">40〜49歳</option>
                <option value="50〜59歳">50〜59歳</option>
                <option value="60〜69歳">60〜69歳</option>
                <option value="70〜79歳">70〜79歳</option>
                <option value="80歳以上">80歳以上</option>
            </select>
            
            <label>性別</label>
            <select id="gender">
                <option value="">選択してください</option>
                <option value="男性">男性</option>
                <option value="女性">女性</option>
                <option value="回答しない">回答しない</option>
            </select>

            <label>同行者の人数（自分を含めない）</label>
            <select id="groupSize">
                <option value="0人">0人</option>
                <option value="1人">1人</option>
                <option value="2人">2人</option>
                <option value="3人">3人</option>
                <option value="4人">4人</option>
                <option value="5人以上">5人以上</option>
            </select>

            <label>同行者の内訳（最も当てはまるものを１つ選択してください）</label>
            <select id="groupType">
                <option value="">選択してください</option>
                <option value="家族">家族</option>
                <option value="友人・知人">友人・知人</option>
                <option value="仕事仲間">仕事仲間</option>
                <option value="その他">その他</option>
            </select>

            <label>宇部市中心市街地への来訪頻度</label>
            <select id="frequency">
                <option value="">選択してください</option>
                <option value="初めて">初めて</option>
                <option value="年数回程度">年数回程度</option>
                <option value="月1回程度">月1回程度</option>
                <option value="月数回程度">月数回程度</option>
                <option value="週1回程度">週1回以上</option>
                <option value="ほぼ毎日（通勤通学含む）">ほぼ毎日（通勤通学含む）</option>
            </select>

            <label>今日の市街地来訪の主な目的</label>
            <select id="mainPurpose">
                <option value="">選択してください</option>
                <option value="イベントへの参加">イベントへの参加</option>
                <option value="観光・レジャー">観光・レジャー</option>
                <option value="買い物・飲食">買い物・飲食</option>
                <option value="仕事・用事">仕事・用事</option>
                <option value="散歩・通りがかり">散歩・通りがかり</option>
                <option value="その他">その他</option>
            </select>

            <label>市街地へ来る際に利用した主な交通手段</label>
            <select id="transport" onchange="toggleExtraQuestion()">
                <option value="">選択してください</option>
                <option value="徒歩">徒歩</option>
                <option value="自転車">自転車</option>
                <option value="自家用車">自家用車</option>
                <option value="バス">バス</option>
                <option value="JR">JR</option>
                <option value="タクシー">タクシー</option>
                <option value="その他">その他</option>
            </select>

            <div id="extraQuestionArea">
                <label id="extraQuestionLabel" style="color: #0056b3;"></label>
                <select id="extraDetail"></select>
            </div>

             <div class="road-map-container">
                <label>【市街地内で歩いた道】今日、市街地内で歩いた道があれば、番号で選んでください</label>
                <img src="map.png" alt="道路地図" style="width: 100%; max-width: 500px; height: auto; margin: 10px 0; border-radius: 5px;" onerror="this.src='https://via.placeholder.com/500x300?text=map.pngが見つかりません';">
                <div class="road-grid">
                    <label class="road-item"><input type="checkbox" name="roads" value="1">①</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="2">②</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="3">③</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="4">④</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="5">⑤</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="6">⑥</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="7">⑦</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="8">⑧</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="9">⑨</label>
                    <label class="road-item"><input type="checkbox" name="roads" value="10">⑩</label>
                </div>
            </div>


            <label>今日の市街地での滞在予定時間</label>
            <select id="stayTime">
                <option value="">選択してください</option>
                <option value="30分未満">30分未満</option>
                <option value="30分〜1時間">30分〜1時間</option>
                <option value="1時間〜2時間">1時間〜2時間</option>
                <option value="2時間以上">2時間以上</option>
            </select>
        </div>

        <div class="section">
            <h3>2. 今日、消費した、または消費する予定の金額について</h3>
            <label>イベント「内」で消費した、または消費する予定の金額について</label>
            <select id="expEvent">
                <option value="">選択してください</option>
                <option value="0円">0円</option>
                <option value="500円未満">500円未満</option>
                <option value="500円〜1,000円">500円〜1,000円</option>
                <option value="1,000円〜1,500円">1,000円〜1,500円</option>
                <option value="1,500円〜2,000円">1,500円〜2,000円</option>
                <option value="2,000円〜2,500円">2,000円〜2,500円</option>
                <option value="2,500円〜3,000円">2,500円〜3,000円</option>
                <option value="3,000円以上">3,000円以上</option>
            </select>
            
            <label>主な消費内容（イベント内・複数選択可）</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="contE" value="飲食（食事・軽食・喫茶店など）"> 飲食（食事・軽食・喫茶店など）</label>
                <label class="checkbox-item"><input type="checkbox" name="contE" value="体験料・ワークショップ参加費"> 体験料・ワークショップ参加費</label>
                <label class="checkbox-item"><input type="checkbox" name="contE" value="買い物（おみやげ・日用品など）"> 買い物（おみやげ・日用品など）</label>
                <label class="checkbox-item"><input type="checkbox" name="contE" value="その他"> その他</label>
            </div>

            <label style="margin-top: 25px;">イベント「外」で消費した、または消費する予定の金額について</label>
            <select id="expOutside">
                <option value="">選択してください</option>
                <option value="0円">0円</option>
                <option value="500円未満">500円未満</option>
                <option value="500円〜1,000円">500円〜1,000円</option>
                <option value="1,000円〜1,500円">1,000円〜1,500円</option>
                <option value="1,500円〜2,000円">1,500円〜2,000円</option>
                <option value="2,000円〜2,500円">2,000円〜2,500円</option>
                <option value="2,500円〜3,000円">2,500円〜3,000円</option>
                <option value="3,000円以上">3,000円以上</option>
            </select>

            <label>主な消費内容（イベント外・複数選択可）</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="contO" value="飲食（食事・軽食・喫茶店など）"> 飲食（食事・軽食・喫茶店など）</label>
                <label class="checkbox-item"><input type="checkbox" name="contO" value="体験料・ワークショップ参加費"> 体験料・ワークショップ参加費</label>
                <label class="checkbox-item"><input type="checkbox" name="contO" value="近隣での買い物（おみやげ・日用品など）"> 近隣での買い物（おみやげ・日用品など）</label>
                <label class="checkbox-item"><input type="checkbox" name="contO" value="交通費（駐車場代・タクシー・公共交通機関）"> 交通費（駐車場代・タクシー・公共交通機関）</label>
                <label class="checkbox-item"><input type="checkbox" name="contO" value="その他"> その他</label>
            </div>
        </div>

        <div class="section">
            <h3>3. 今日、訪れた、または訪れる予定の地点と到着した、到着予定の時間</h3>
            <div class="map-instruction">
                地図をタップして、訪れた、または訪れる予定の場所を記録してください（複数可）
            </div>
            <div id="map"></div>
            <div id="log">現在記録された地点: 0ヶ所</div>
        </div>

        <button id="sendBtn" onclick="sendData()">回答を送信する</button>
    </div>

    <div id="thanks-page" class="section">
        <div class="check-mark">✓</div>
        <h2>回答ありがとうございました</h2>
        <p>アンケートは正常に送信されました。</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 最新のデプロイURL
        const gasUrl = "https://script.google.com/macros/s/AKfycbzK-o3o0CZ6CSXbxEnZmmNFm0wueEgh62jUdP4pfbyjsZRn3t-Ruzo90Q0W8mJr4bc/exec";
        
        let surveyData = [];
        const map = L.map('map').setView([33.9515, 131.2465], 16); 
        L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '&copy; Google Maps'
        }).addTo(map);

        function toggleExtraQuestion() {
            const transport = document.getElementById('transport').value;
            const area = document.getElementById('extraQuestionArea');
            const label = document.getElementById('extraQuestionLabel');
            const select = document.getElementById('extraDetail');
            
            // 修正箇所：カンマの不足などを修正し、リストを整理しました
            const options = {
                "自家用車": [
                    "--- 駐車場を選択 ---", "西京銀行", "西日本シティ銀行", "福岡銀行", "山口銀行", 
                    "市役所立体駐車場", "ときわ通りパーキング", "ボスティビルド地下駐車場", 
                    "寿町第一駐車場", "寿町第二駐車場", "西中国信用金庫", "その他"
                ],
                "バス": [
                    "--- バス停を選択 ---", "宇部新川駅", "宇部中央", "市役所前", 
                    "常盤町一丁目", "常盤町二丁目", "その他"
                ],
                "JR": [
                    "--- 駅を選択 ---", "宇部新川駅", "琴芝駅", "東新川駅", "その他"
                ]
            };

            select.innerHTML = "";
            if (options[transport]) {
                label.innerText = transport === "自家用車" ? "利用した駐車場" : (transport === "バス" ? "降車したバス停" : "降車した駅");
                options[transport].forEach(opt => {
                    const el = document.createElement("option");
                    el.value = opt.includes("---") ? "" : opt;
                    el.textContent = opt;
                    select.appendChild(el);
                });
                area.style.display = "block";
            } else {
                area.style.display = "none";
            }
        }

        map.on('click', function(e) {
            const lat = e.latlng.lat, lng = e.latlng.lng;
            const popupNode = document.createElement('div');
            popupNode.innerHTML = `
                <div style="padding:5px; min-width:150px;">
                    <label style="margin:0; font-size:12px;">到着時間</label>
                    <input type="time" id="vTime" style="padding:5px; margin-bottom:10px; width:100%;">
                    <label style="margin:0; font-size:12px;">目的</label>
                    <select id="p" style="padding:5px; margin-bottom:10px; width:100%;">
                        <option value="飲食">飲食</option>
                        <option value="買い物">買い物</option>
                        <option value="イベント参加">イベント参加</option>
                        <option value="休憩">休憩</option>
                        <option value="その他">その他</option>
                    </select>
                    <button onclick="savePoint(${lat}, ${lng})" style="width:100%; background:#28a745; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; font-weight:bold;">この地点を保存</button>
                </div>
            `;
            L.popup().setLatLng(e.latlng).setContent(popupNode).openOn(map);
        });

        function savePoint(lat, lng) {
            const time = document.getElementById('vTime').value, purpose = document.getElementById('p').value;
            if(!time) return alert("到着時間を入力してください");
            surveyData.push({ lat, lng, time, purpose });
            L.marker([lat, lng]).addTo(map).bindPopup(`${purpose} (${time})`).openPopup();
            document.getElementById('log').innerHTML = `現在記録された地点: ${surveyData.length}ヶ所`;
            map.closePopup();
        }

        function sendData() {
            const age = document.getElementById('age').value;
            const transport = document.getElementById('transport').value;
            const btn = document.getElementById('sendBtn');

            if(!age || !transport || surveyData.length === 0) return alert("必須項目をすべて入力してください");
            
            if(confirm("回答を送信しますか？")) {
                btn.disabled = true;
                btn.innerText = "送信中...";
                btn.style.backgroundColor = "#ccc";

                const payload = {
                    userId: "ID_" + new Date().getTime(),
                    attr: {
                        age: age,
                        gender: document.getElementById('gender').value,
                        groupSize: document.getElementById('groupSize').value,
                        groupType: document.getElementById('groupType').value,
                        freq: document.getElementById('frequency').value,
                        mainPurpose: document.getElementById('mainPurpose').value,
                        trans: transport,
                        transDetail: document.getElementById('extraDetail')?.value || "",
                        usedRoads: Array.from(document.querySelectorAll('input[name="roads"]:checked')).map(c => c.value).join(", "),
                        stay: document.getElementById('stayTime').value,
                        expE: document.getElementById('expEvent').value,
                        contE: Array.from(document.querySelectorAll('input[name="contE"]:checked')).map(c => c.value).join(", "),
                        expO: document.getElementById('expOutside').value,
                        contO: Array.from(document.querySelectorAll('input[name="contO"]:checked')).map(c => c.value).join(", ")
                    },
                    points: surveyData
                };

                fetch(gasUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
                .then(() => {
                    document.getElementById('survey-form').style.display = 'none';
                    document.getElementById('thanks-page').style.display = 'block';
                    window.scrollTo(0, 0);
                }).catch(() => {
                    alert("送信エラーが発生しました。");
                    btn.disabled = false;
                    btn.innerText = "回答を送信する";
                    btn.style.backgroundColor = "#007bff";
                });
            }
        }
    </script>
</body>
</html>
